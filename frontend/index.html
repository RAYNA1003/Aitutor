<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tutor Compiler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --red: #f85149;
            --text: #e6edf3;
            --muted: #8b949e;
            --yellow: #d29922;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top Bar ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: .5px;
            color: var(--text);
        }

        .logo-icon {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, #1f6feb, #388bfd);
            border-radius: 8px;
            display: grid; place-items: center;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        /* ── Main Layout ── */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 0;
        }

        /* ── Panels ── */
        .panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .panel:last-child { border-right: none; }

        .panel-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .7px;
        }

        .panel-title i { font-size: 11px; }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 6px var(--accent2);
        }

        /* ── Toolbar ── */
        .toolbar {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .toolbar select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.78rem;
            outline: none;
            cursor: pointer;
        }

        .toolbar select:hover { border-color: var(--accent); }

        .toolbar-sep {
            width: 1px; height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--muted);
            border-radius: 6px;
            width: 28px; height: 28px;
            display: grid; place-items: center;
            cursor: pointer;
            font-size: 12px;
            transition: all .15s;
        }

        .icon-btn:hover {
            background: var(--surface);
            border-color: var(--border);
            color: var(--text);
        }

        /* ── Code Editor ── */
        .editor-wrap {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .line-numbers {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 16px 12px;
            color: var(--muted);
            font: 14px/1.6 'Courier New', monospace;
            text-align: right;
            user-select: none;
            min-width: 44px;
            overflow: hidden;
        }

        #code {
            flex: 1;
            background: var(--bg);
            color: var(--text);
            border: none;
            outline: none;
            resize: none;
            padding: 16px;
            font: 14px/1.6 'Courier New', monospace;
            tab-size: 4;
            overflow-y: auto;
        }

        #code::selection { background: #264f78; }

        /* ── Run Button ── */
        .run-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .status-text {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #run-btn {
            background: linear-gradient(135deg, #238636, #2ea043);
            border: 1px solid #3fb950;
            color: #fff;
            padding: 8px 22px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .2s;
            box-shadow: 0 0 0 0 rgba(63,185,80,0);
        }

        #run-btn:hover {
            background: linear-gradient(135deg, #2ea043, #3fb950);
            box-shadow: 0 0 12px rgba(63,185,80,.35);
            transform: translateY(-1px);
        }

        #run-btn:active { transform: translateY(0); }

        #run-btn.loading {
            background: var(--surface2);
            border-color: var(--border);
            color: var(--muted);
            cursor: not-allowed;
        }

        #run-btn .spinner {
            display: none;
            width: 13px; height: 13px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        #run-btn.loading .spinner { display: block; }
        #run-btn.loading .run-icon { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Output Panel ── */
        .output-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font: 13.5px/1.7 'Courier New', monospace;
            position: relative;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 12px;
            font-family: 'Segoe UI', sans-serif;
        }

        .empty-state i { font-size: 2rem; opacity: .4; }
        .empty-state p { font-size: 0.85rem; }

        #output-text { white-space: pre-wrap; }

        #output-text.success { color: #aff5b4; }
        #output-text.error   { color: #ffa198; }

        /* ── Output Stats Bar ── */
        .output-footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.72rem;
            color: var(--muted);
            flex-shrink: 0;
        }

        .stat { display: flex; align-items: center; gap: 5px; }
        .stat.ok { color: var(--accent2); }
        .stat.err { color: var(--red); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .panel { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">
        <div class="logo-icon"><i class="fa fa-code" style="color:#fff"></i></div>
        Tutor Compiler
    </div>
    <div class="header-actions">
        <span class="badge">C / C++</span>
    </div>
</header>

<!-- Workspace -->
<div class="workspace">

    <!-- Editor Panel -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">
                <i class="fa fa-file-code"></i>
                editor &nbsp;<span style="color:var(--accent)">main.c</span>
            </div>
            <div class="dot"></div>
        </div>

        <div class="toolbar">
            <select id="theme-sel" title="Theme">
                <option>Dark</option>
                <option>Darker</option>
            </select>
            <div class="toolbar-sep"></div>
            <button class="icon-btn" title="Copy code" onclick="copyCode()"><i class="fa fa-copy"></i></button>
            <button class="icon-btn" title="Clear editor" onclick="clearEditor()"><i class="fa fa-trash"></i></button>
            <button class="icon-btn" title="Wrap lines" onclick="toggleWrap()"><i class="fa fa-align-left"></i></button>
        </div>

        <div class="editor-wrap">
            <div class="line-numbers" id="line-nums">1</div>
            <textarea id="code" spellcheck="false" autocorrect="off" autocapitalize="off"
                placeholder="// Write your mini c code here...">int main() {
    int a;
    a = 5;
    return 0;
}</textarea>
        </div>

        <div class="run-bar">
            <div class="status-text">
                <i class="fa fa-circle" style="color:var(--accent2);font-size:8px"></i>
                <span id="status-label">Ready</span>
            </div>
            <button id="run-btn" onclick="compileCode()">
                <span class="spinner"></span>
                <i class="fa fa-play run-icon"></i>
                Run &amp; Compile
            </button>
        </div>
    </div>

    <!-- Output Panel -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">
                <i class="fa fa-terminal"></i>
                output &nbsp;<span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">console</span>
            </div>
            <button class="icon-btn" title="Clear output" onclick="clearOutput()"><i class="fa fa-times"></i></button>
        </div>

        <div class="output-body" id="output-body">
            <div class="empty-state" id="empty-state">
                <i class="fa fa-terminal"></i>
                <p>Hit <strong>Run &amp; Compile</strong> to see output</p>
            </div>
            <pre id="output-text"></pre>
        </div>

        <div class="output-footer" id="output-footer">
            <span class="stat" id="stat-status">—</span>
            <span class="stat" id="stat-time"></span>
            <span class="stat" id="stat-lines"></span>
        </div>
        <div class="panel-header">
        <div class="panel-title">
            <i class="fa fa-robot"></i>
            AI Explanation
        </div>
    </div>

    <div class="output-body">
        <pre id="ai-text"></pre>
    </div>
    </div>

</div>

<script>
    /* ── Line Numbers ── */
    const codeEl = document.getElementById('code');
    const lineNums = document.getElementById('line-nums');

    function updateLineNumbers() {
        const lines = codeEl.value.split('\n').length;
        lineNums.textContent = Array.from({length: lines}, (_, i) => i + 1).join('\n');
    }

    codeEl.addEventListener('input', updateLineNumbers);
    codeEl.addEventListener('scroll', () => { lineNums.scrollTop = codeEl.scrollTop; });
    updateLineNumbers();

    /* Tab support */
    codeEl.addEventListener('keydown', e => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const s = codeEl.selectionStart;
            codeEl.value = codeEl.value.slice(0, s) + '    ' + codeEl.value.slice(codeEl.selectionEnd);
            codeEl.selectionStart = codeEl.selectionEnd = s + 4;
            updateLineNumbers();
        }
    });

    /* ── Toolbar actions ── */
    function copyCode() {
        navigator.clipboard.writeText(codeEl.value);
        showStatus('Copied!', 1500);
    }

    function clearEditor() {
        codeEl.value = '';
        updateLineNumbers();
    }

    let wrapped = false;
    function toggleWrap() {
        wrapped = !wrapped;
        codeEl.style.whiteSpace = wrapped ? 'pre-wrap' : 'pre';
    }

    function clearOutput() {
        document.getElementById('output-text').textContent = '';
        document.getElementById('output-text').className = '';
        document.getElementById('empty-state').style.display = 'flex';
        resetStats();
    }

    function resetStats() {
        document.getElementById('stat-status').textContent = '—';
        document.getElementById('stat-status').className = 'stat';
        document.getElementById('stat-time').textContent = '';
        document.getElementById('stat-lines').textContent = '';
    }

    function showStatus(msg, ms) {
        const el = document.getElementById('status-label');
        el.textContent = msg;
        setTimeout(() => el.textContent = 'Ready', ms || 2000);
    }

    /* ── Compile ── */
    async function compileCode() {
        const code = codeEl.value.trim();
        if (!code) return;

        const btn = document.getElementById('run-btn');
        btn.classList.add('loading');
        btn.disabled = true;
        document.getElementById('status-label').textContent = 'Compiling…';

        const t0 = performance.now();

        try {
            const response = await fetch('http://localhost:5001/compile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });

            const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
            const data = await response.json();
           const out = data.compiler_output || '';
           document.getElementById("ai-text").textContent = data.ai_explanation || "";
            const isError = /error|Error/.test(out);

            document.getElementById('empty-state').style.display = 'none';

            const outEl = document.getElementById('output-text');
            outEl.textContent = out;
            outEl.className = isError ? 'error' : 'success';

            // Stats
            const statStatus = document.getElementById('stat-status');
            statStatus.className = 'stat ' + (isError ? 'err' : 'ok');
            statStatus.innerHTML = isError
                ? '<i class="fa fa-times-circle"></i> Error'
                : '<i class="fa fa-check-circle"></i> Success';

            document.getElementById('stat-time').innerHTML =
                `<i class="fa fa-clock"></i> ${elapsed}s`;

            const lines = out.split('\n').length;
            document.getElementById('stat-lines').innerHTML =
                `<i class="fa fa-list"></i> ${lines} line${lines !== 1 ? 's' : ''}`;

            showStatus(isError ? 'Compile error' : 'Done ✓', 2500);

        } catch (err) {
            document.getElementById('empty-state').style.display = 'none';
            const outEl = document.getElementById('output-text');
            outEl.textContent = '⚠ Could not reach the compile server.\nMake sure localhost:5001 is running.';
            outEl.className = 'error';
            showStatus('Server error', 3000);
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }

    /* Ctrl+Enter shortcut */
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') compileCode();
    });
</script>
</body>
</html>
